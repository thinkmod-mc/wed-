<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Trị Video</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="admin-body">

    <div id="adminContent" style="display: none;">
        <header class="glass-header">
            <div class="header-container">
                <h1 class="logo"><i class="fas fa-cog"></i> Admin Dashboard</h1>
                <nav>
                    <a href="index.html" class="admin-link"><i class="fas fa-home"></i> Xem trang chủ</a>
                    <button onclick="logoutAdmin()" class="btn btn-danger btn-sm"><i class="fas fa-sign-out-alt"></i> Đăng xuất</button>
                </nav>
            </div>
        </header>

        <main class="container admin-container">
            <section class="admin-section glass-panel">
                <h2 id="formTitle">Thêm Video Mới</h2>
                <form id="videoForm">
                    <input type="hidden" id="videoId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Tiêu đề Video *</label>
                            <input type="text" id="videoTitle" required placeholder="Nhập tiêu đề...">
                        </div>
                        <div class="form-group">
                            <label>Danh mục *</label>
                            <select id="videoCategory" required>
                                <option value="music">Âm nhạc</option>
                                <option value="education">Giáo dục</option>
                                <option value="entertainment">Giải trí</option>
                                <option value="news">Tin tức</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>Mô tả chi tiết</label>
                        <textarea id="videoDescription" rows="4" placeholder="Nhập mô tả..."></textarea>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>URL Video *</label>
                            <input type="url" id="videoUrl" required placeholder="https://...">
                            <small>Hoặc chọn file để tải lên Storage:</small>
                            <input type="file" id="videoFileUpload" accept="video/*">
                            <progress id="videoProgress" value="0" max="100" style="display:none; width: 100%;"></progress>
                        </div>
                        <div class="form-group">
                            <label>URL Ảnh thu nhỏ (Thumbnail) *</label>
                            <input type="url" id="thumbnailUrl" required placeholder="https://...">
                            <small>Hoặc chọn ảnh để tải lên Storage:</small>
                            <input type="file" id="thumbnailFileUpload" accept="image/*">
                            <progress id="thumbProgress" value="0" max="100" style="display:none; width: 100%;"></progress>
                        </div>
                    </div>

                    <div class="form-actions">
                        <button type="submit" id="btnSave" class="btn btn-primary">Lưu Video</button>
                        <button type="button" id="btnCancel" class="btn btn-secondary" style="display:none;" onclick="resetForm()">Hủy</button>
                    </div>
                </form>
            </section>

            <section class="admin-section glass-panel" style="margin-top: 30px;">
                <h2>Danh sách Video</h2>
                <div class="table-responsive">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Thumbnail</th>
                                <th>Tiêu đề</th>
                                <th>Danh mục</th>
                                <th>Lượt xem</th>
                                <th>Ngày tạo</th>
                                <th>Thao tác</th>
                            </tr>
                        </thead>
                        <tbody id="adminVideoList">
                            </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-storage-compat.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            checkAdminAuthOnly(); // Gọi hàm kiểm tra bảo vệ trang Admin
        });
    </script>
</body>
</html>
