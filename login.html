<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập Quản Trị - VideoHub</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="admin-body" style="display: flex; align-items: center; justify-content: center; height: 100vh;">

    <div class="login-box glass-panel">
        <h2>Đăng nhập Quản Trị</h2>
        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="adminEmail" required placeholder="admin@videohub.com">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="adminPassword" required placeholder="******">
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Đăng Nhập</button>
            <div id="loginError" class="error-msg" style="color: #ef4444; margin-top: 15px; text-align: center; font-size: 14px;"></div>
        </form>
        <div style="text-align: center; margin-top: 20px;">
            <a href="index.html" class="admin-link">← Về trang chủ</a>
        </div>
    </div>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-firestore-compat.js"></script> 
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="script.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            initApp();
            setupLoginPage(); 
        });
    </script>
</body>
</html>
